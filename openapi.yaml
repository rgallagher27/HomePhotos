openapi: 3.0.0
info:
  title: HomePhotos API
  description: HomePhotos REST API
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local development server
security:
  - BearerAuth: []
tags:
  - name: Health
    description: Health check
  - name: Auth
    description: Authentication and registration
  - name: Users
    description: User management
  - name: Photos
    description: Photo browsing and metadata
  - name: Tags
    description: Tag and tag group management
  - name: Scanner
    description: Filesystem scanner
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Health check
      description: Returns service health status including database connectivity
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/health_response'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/health_response'
  /api/v1/auth/register:
    post:
      operationId: postAuthRegister
      tags:
        - Auth
      summary: Register a new user
      description: Create a new user account. First user gets admin role.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/register_request'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_response'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
  /api/v1/auth/login:
    post:
      operationId: postAuthLogin
      tags:
        - Auth
      summary: Log in
      description: Authenticate with username and password to receive a JWT.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/login_request'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_response'
        '401':
          $ref: '#/components/responses/401'
  /api/v1/auth/me:
    get:
      operationId: getAuthMe
      tags:
        - Auth
      summary: Get current user
      description: Returns the authenticated user's profile.
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user_response'
        '401':
          $ref: '#/components/responses/401'
  /api/v1/users:
    get:
      operationId: getUsers
      tags:
        - Users
      summary: List users
      description: List all users. Admin only.
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user_list_response'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
  /api/v1/users/{id}/role:
    put:
      operationId: putUserRole
      tags:
        - Users
      summary: Update user role
      description: Change a user's role. Admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update_role_request'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user_response'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
  /api/v1/photos:
    get:
      operationId: getPhotos
      tags:
        - Photos
      summary: List photos
      description: List photos with pagination, filtering, and sorting
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor from previous response
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
          description: Number of photos per page
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - captured_at
              - file_name
            default: captured_at
          description: Field to sort by
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort direction
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Include photos captured on or after this date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Include photos captured on or before this date
        - name: folder
          in: query
          schema:
            type: string
          description: Filter to photos within a folder path
        - name: format
          in: query
          schema:
            type: string
          description: Filter by file format (e.g. arw, jpg)
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tag IDs to filter by
        - name: tag_mode
          in: query
          schema:
            type: string
            enum:
              - and
              - or
            default: or
          description: Tag filter mode — and (all tags required) or or (any tag matches)
      responses:
        '200':
          description: List of photos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/photo_list_response'
        '401':
          $ref: '#/components/responses/401'
  /api/v1/photos/{id}:
    get:
      operationId: getPhoto
      tags:
        - Photos
      summary: Get photo detail
      description: Retrieve full detail for a single photo including all EXIF metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Photo detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/photo_detail_response'
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
  /api/v1/photos/{id}/image:
    get:
      operationId: getPhotoImage
      tags:
        - Photos
      summary: Get photo image
      description: Serve a photo image variant (thumbnail, preview, or full resolution)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: size
          in: query
          required: true
          schema:
            type: string
            enum:
              - thumb
              - preview
              - full
      responses:
        '200':
          description: Image binary
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
  /api/v1/tags:
    get:
      operationId: getTags
      tags:
        - Tags
      summary: List tags
      description: List all tags with group information
      responses:
        '200':
          description: List of tags
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tag_list_response'
        '401':
          $ref: '#/components/responses/401'
    post:
      operationId: postTag
      tags:
        - Tags
      summary: Create tag
      description: Create a new tag. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_tag_request'
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tag_response'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '409':
          $ref: '#/components/responses/409'
  /api/v1/tags/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    put:
      operationId: putTag
      tags:
        - Tags
      summary: Update tag
      description: Update a tag's name, color, or group. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update_tag_request'
      responses:
        '200':
          description: Tag updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tag_response'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '409':
          $ref: '#/components/responses/409'
    delete:
      operationId: deleteTag
      tags:
        - Tags
      summary: Delete tag
      description: Delete a tag. Cascades to photo-tag associations. Admin only.
      responses:
        '204':
          description: Tag deleted
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
  /api/v1/tag-groups:
    get:
      operationId: getTagGroups
      tags:
        - Tags
      summary: List tag groups
      description: List all tag groups ordered by sort_order
      responses:
        '200':
          description: List of tag groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tag_group_list_response'
        '401':
          $ref: '#/components/responses/401'
    post:
      operationId: postTagGroup
      tags:
        - Tags
      summary: Create tag group
      description: Create a new tag group. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create_tag_group_request'
      responses:
        '201':
          description: Tag group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tag_group_response'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '409':
          $ref: '#/components/responses/409'
  /api/v1/tag-groups/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    put:
      operationId: putTagGroup
      tags:
        - Tags
      summary: Update tag group
      description: Update a tag group's name or sort order. Admin only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update_tag_group_request'
      responses:
        '200':
          description: Tag group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tag_group_response'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '409':
          $ref: '#/components/responses/409'
    delete:
      operationId: deleteTagGroup
      tags:
        - Tags
      summary: Delete tag group
      description: Delete a tag group. Tags in the group become ungrouped. Admin only.
      responses:
        '204':
          description: Tag group deleted
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
  /api/v1/photos/{id}/tags:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    post:
      operationId: postPhotoTags
      tags:
        - Photos
      summary: Assign tags to photo
      description: Add tags to a photo. Idempotent — re-adding an existing tag has no effect.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/assign_tags_request'
      responses:
        '204':
          description: Tags assigned
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
  /api/v1/photos/{id}/tags/{tagId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: tagId
        in: path
        required: true
        schema:
          type: integer
          format: int64
    delete:
      operationId: deletePhotoTag
      tags:
        - Photos
      summary: Remove tag from photo
      description: Remove a tag association from a photo. Idempotent.
      responses:
        '204':
          description: Tag removed
        '401':
          $ref: '#/components/responses/401'
        '404':
          $ref: '#/components/responses/404'
  /api/v1/photos/bulk-tag:
    post:
      operationId: postBulkTag
      tags:
        - Photos
      summary: Bulk assign tags
      description: Assign tags to multiple photos at once. Idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bulk_tag_request'
      responses:
        '204':
          description: Tags assigned
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
  /api/v1/scanner/run:
    post:
      operationId: postScannerRun
      tags:
        - Scanner
      summary: Trigger a filesystem scan
      description: Start a filesystem scan. Returns 409 if a scan is already in progress.
      responses:
        '202':
          description: Scan started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scanner_run_response'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '409':
          $ref: '#/components/responses/409'
  /api/v1/scanner/status:
    get:
      operationId: getScannerStatus
      tags:
        - Scanner
      summary: Get scanner status
      description: Returns the current state of the filesystem scanner
      responses:
        '200':
          description: Scanner status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/scanner_status_response'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from login endpoint
  schemas:
    health_response:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum:
            - ok
            - degraded
        timestamp:
          type: string
          format: date-time
    register_request:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
        email:
          type: string
    auth_response:
      type: object
      required:
        - id
        - username
        - role
        - token
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        role:
          type: string
          enum:
            - admin
            - viewer
        token:
          type: string
    error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
    login_request:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    user_response:
      type: object
      required:
        - id
        - username
        - role
        - created_at
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        role:
          type: string
          enum:
            - admin
            - viewer
        display_name:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
    user_list_response:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/user_response'
    update_role_request:
      type: object
      required:
        - role
      properties:
        role:
          type: string
          enum:
            - admin
            - viewer
    photo_tag_summary:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
    photo_list_item:
      type: object
      required:
        - id
        - file_name
        - format
        - cache_status
      properties:
        id:
          type: integer
          format: int64
        file_name:
          type: string
        file_path:
          type: string
        format:
          type: string
        captured_at:
          type: string
          format: date-time
          nullable: true
        camera_model:
          type: string
          nullable: true
        cache_status:
          type: string
          enum:
            - pending
            - cached
            - error
        thumb_url:
          type: string
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/photo_tag_summary'
    photo_list_response:
      type: object
      required:
        - data
        - has_more
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/photo_list_item'
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
    tag_response:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        color:
          type: string
          nullable: true
        group_id:
          type: integer
          format: int64
          nullable: true
        group_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    photo_detail_response:
      type: object
      required:
        - id
        - file_name
        - file_path
        - file_size_bytes
        - format
        - scanned_at
        - cache_status
      properties:
        id:
          type: integer
          format: int64
        file_name:
          type: string
        file_path:
          type: string
        file_size_bytes:
          type: integer
          format: int64
        format:
          type: string
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        captured_at:
          type: string
          format: date-time
          nullable: true
        scanned_at:
          type: string
          format: date-time
        camera_make:
          type: string
          nullable: true
        camera_model:
          type: string
          nullable: true
        lens_model:
          type: string
          nullable: true
        focal_length_mm:
          type: number
          format: double
          nullable: true
        aperture:
          type: number
          format: double
          nullable: true
        shutter_speed:
          type: string
          nullable: true
        iso:
          type: integer
          nullable: true
        gps_latitude:
          type: number
          format: double
          nullable: true
        gps_longitude:
          type: number
          format: double
          nullable: true
        cache_status:
          type: string
          enum:
            - pending
            - cached
            - error
        thumb_url:
          type: string
          nullable: true
        preview_url:
          type: string
          nullable: true
        full_url:
          type: string
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/tag_response'
    tag_list_response:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/tag_response'
    create_tag_request:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        color:
          type: string
        group_id:
          type: integer
          format: int64
    update_tag_request:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
          nullable: true
        group_id:
          type: integer
          format: int64
          nullable: true
    tag_group_response:
      type: object
      required:
        - id
        - name
        - sort_order
        - created_at
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        sort_order:
          type: integer
        created_at:
          type: string
          format: date-time
    tag_group_list_response:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/tag_group_response'
    create_tag_group_request:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        sort_order:
          type: integer
    update_tag_group_request:
      type: object
      properties:
        name:
          type: string
        sort_order:
          type: integer
    assign_tags_request:
      type: object
      required:
        - tag_ids
      properties:
        tag_ids:
          type: array
          items:
            type: integer
            format: int64
    bulk_tag_request:
      type: object
      required:
        - photo_ids
        - tag_ids
      properties:
        photo_ids:
          type: array
          items:
            type: integer
            format: int64
        tag_ids:
          type: array
          items:
            type: integer
            format: int64
    scanner_run_response:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    scanner_status_response:
      type: object
      required:
        - status
        - total_files
        - processed
        - errors
      properties:
        status:
          type: string
        total_files:
          type: integer
        processed:
          type: integer
        errors:
          type: integer
        started_at:
          type: string
          format: date-time
          nullable: true
  responses:
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
    '409':
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/error'
