type: object
required:
  - id
  - username
  - role
  - created_at
properties:
  id:
    type: integer
    format: int64
  username:
    type: string
  role:
    type: string
    enum:
      - admin
      - viewer
  display_name:
    type: string
    nullable: true
  email:
    type: string
    nullable: true
  created_at:
    type: string
    format: date-time
  last_login:
    type: string
    format: date-time
    nullable: true
