openapi: 3.0.0
info:
  title: HomePhotos API
  description: HomePhotos REST API
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /health:
    $ref: paths/health.yaml
  /api/v1/auth/register:
    $ref: paths/auth_register.yaml
  /api/v1/auth/login:
    $ref: paths/auth_login.yaml
  /api/v1/auth/me:
    $ref: paths/auth_me.yaml
  /api/v1/users:
    $ref: paths/users.yaml
  /api/v1/users/{id}/role:
    $ref: paths/users_id_role.yaml
  /api/v1/photos:
    $ref: paths/photos.yaml
  /api/v1/photos/{id}:
    $ref: paths/photos_id.yaml
  /api/v1/photos/{id}/image:
    $ref: paths/photos_id_image.yaml
  /api/v1/tags:
    $ref: paths/tags.yaml
  /api/v1/tags/{id}:
    $ref: paths/tags_id.yaml
  /api/v1/tag-groups:
    $ref: paths/tag_groups.yaml
  /api/v1/tag-groups/{id}:
    $ref: paths/tag_groups_id.yaml
  /api/v1/photos/{id}/tags:
    $ref: paths/photos_id_tags.yaml
  /api/v1/photos/{id}/tags/{tagId}:
    $ref: paths/photos_id_tags_tagid.yaml
  /api/v1/photos/bulk-tag:
    $ref: paths/photos_bulk_tag.yaml
  /api/v1/scanner/run:
    $ref: paths/scanner_run.yaml
  /api/v1/scanner/status:
    $ref: paths/scanner_status.yaml
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from login endpoint
security:
  - BearerAuth: []
tags:
  - name: Health
    description: Health check
  - name: Auth
    description: Authentication and registration
  - name: Users
    description: User management
  - name: Photos
    description: Photo browsing and metadata
  - name: Tags
    description: Tag and tag group management
  - name: Scanner
    description: Filesystem scanner
