put:
  operationId: putUserRole
  tags:
    - Users
  summary: Update user role
  description: Change a user's role. Admin only.
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/schemas/update_role_request.yaml'
  responses:
    '200':
      description: Role updated
      content:
        application/json:
          schema:
            $ref: '../components/schemas/user_response.yaml'
    '400':
      $ref: '../components/responses/400.yaml'
    '401':
      $ref: '../components/responses/401.yaml'
    '403':
      $ref: '../components/responses/403.yaml'
    '404':
      $ref: '../components/responses/404.yaml'
